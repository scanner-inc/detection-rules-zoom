# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: Zoom Sign In Method Modified
description: |-
  Detect when a Zoom user modifies the organization's sign in method settings,
  such as enabling Google or Apple ID sign-in.
enabled: true
severity: Medium
query_text: |-
  %ingest.source_type:zoom
  action:Update
  category_type:Account
  operation_detail:'Sign-in Methods  - Allow users to sign in with * from Off to On'
  | groupbycount(operator)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- medium_severity_alerts
tags:
- tactics.ta0005.defense_evasion
- techniques.t1556.modify_authentication_process
- source.zoom
