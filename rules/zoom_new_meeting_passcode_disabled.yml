# schema: https://scanner.dev/schema/scanner-detection-rule.v1.json
name: Zoom New Meeting Passcode Disabled
description: |-
  Detect when a Zoom user turns off the organization's setting to require a
  passcode when scheduling new meetings. This can weaken meeting security
  controls.
severity: Medium
query_text: |-
  @scnr.source_type:zoom
  action:Update
  category_type:Account
  operation_detail:'Require a passcode when scheduling new meetings: from On to Off'
  | groupbycount(operator)
  | where @q.count > 0
time_range_s: 300
run_frequency_s: 60
event_sink_keys:
- medium_severity_alerts
tags:
- tactics.ta0005.defense_evasion
- techniques.t1562.impair_defenses
- source.zoom
